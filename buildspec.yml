version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.9
    commands:
      - apt-get update && apt-get install -y libpq-dev build-essential
      - pip install -r requirements.txt

  pre_build:
    commands:
      - echo "Logging in to ECR..."
      - aws ecr get-login-password --region eu-north-1 | docker login --username AWS --password-stdin 758327527391.dkr.ecr.eu-north-1.amazonaws.com

  build:
    commands:
      - echo "Building Docker image..."
      - docker build -t ecr/ci-cd .
      - docker tag ecr/ci-cd:latest 758327527391.dkr.ecr.eu-north-1.amazonaws.com/ecr/ci-cd:latest

  post_build:
    commands:
      - echo "Pushing to ECR..."
      - docker push 758327527391.dkr.ecr.eu-north-1.amazonaws.com/ecr/ci-cd:latest

# Optional: Add these environment variables in CodeBuild instead (recommended)
# env:
#   variables:
#     ECR_REGISTRY: "758327527391.dkr.ecr.eu-north-1.amazonaws.com"
#     ECR_REPO: "ecr/ci-cd"

artifacts:
  files:
    - '**/*'
  base-directory: '/app'
